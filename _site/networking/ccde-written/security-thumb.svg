<svg xmlns="http://www.w3.org/2000/svg" style="max-width:100%;max-height:721px;" xlink="http://www.w3.org/1999/xlink" version="1.1" width="793px" viewbox="-0.5 -0.5 793 721"><defs></defs><g><g data-cell-id="0"><g data-cell-id="1"><g data-cell-id="Ptw68NtBQNoohyIQZFK3-14"><g transform="translate(0.5,0.5)"><rect x="400" y="350" width="270" height="270" rx="16.2" ry="16.2" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: rgb(245, 245, 245); stroke: rgb(102, 102, 102);"></rect></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-1"><g transform="translate(0.5,0.5)"><rect x="160" y="0" width="220" height="80" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="28">Protection and inspection at</text><text x="166" y="47">applications layer with more</text><text x="166" y="66">specialized functions</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-2"><g transform="translate(0.5,0.5)"><rect x="160" y="210" width="220" height="120" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="248.5">Network-based solution</text><text x="166" y="267.5">between&nbsp;physical or logical</text><text x="166" y="286.5">domains&nbsp;or networks</text><text x="166" y="305.5">(at the chokepoints)</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-3"><g transform="translate(0.5,0.5)"><rect x="160" y="100" width="220" height="90" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="123.5">Technologies running on the</text><text x="166" y="142.5">end system to protect the</text><text x="166" y="161.5">operating system, file system,</text><text x="166" y="180.5">and applications</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-4"><g transform="translate(0.5,0.5)"><rect x="160" y="350" width="220" height="90" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="373.5">For advanced network security,</text><text x="166" y="392.5">network-based deep packet</text><text x="166" y="411.5">inspection&nbsp;can be introduced</text><text x="166" y="430.5">(signature- or anomaly-based)</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-5"><g transform="translate(0.5,0.5)"><rect x="160" y="460" width="220" height="150" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="485">To protect against DoS type of</text><text x="166" y="504">attacks, traffic control (who can</text><text x="166" y="523">access what and how much</text><text x="166" y="542">bandwidth can be used) also</text><text x="166" y="561">control what device can connect</text><text x="166" y="580">and communicate across the</text><text x="166" y="599">network</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-6"><g transform="translate(0.5,0.5)"><rect x="400" y="0" width="270" height="80" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="28">Proxy systems, web proxy/filtering,</text><text x="535" y="47">email proxy/filtering,</text><text x="535" y="66">web application firewall (WAF)</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-7"><g transform="translate(0.5,0.5)"><rect x="160" y="630" width="220" height="90" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="166" y="653.5">To maintain security at the</text><text x="166" y="672.5">physical level&nbsp;where only</text><text x="166" y="691.5">authorized people permitted&nbsp;to</text><text x="166" y="710.5">have physical access</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-8"><g transform="translate(0.5,0.5)"><rect x="400" y="100" width="270" height="90" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="123.5">Host-based firewalls,</text><text x="535" y="142.5">host-based IPS,</text><text x="535" y="161.5">file system integrity checking,</text><text x="535" y="180.5">host antivirus/anti-spyware</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-9"><g transform="translate(0.5,0.5)"><rect x="400" y="210" width="270" height="120" fill="#ffffff" stroke="#7ea6e0" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: rgb(126, 166, 224);"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="239">Router with iACL or with traffic</text><text x="535" y="258">inspection capabilities such as:</text><text x="535" y="277">Zone based Firewall (ZBFW),</text><text x="535" y="296">stateless and stateful firewall,</text><text x="535" y="315">next generation firewall (NGNFW)</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-10"><g transform="translate(0.5,0.5)"><rect x="420" y="370" width="230" height="40" fill="#ffffff" stroke="#000000" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="397">IPS, IDS</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-11"><g transform="translate(0.5,0.5)"><rect x="420" y="460" width="230" height="60" fill="#ffffff" stroke="#000000" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="487.5">Layer 3: L3 iACL, L3 routing</text><text x="535" y="506.5">security, CoPP</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-12"><g transform="translate(0.5,0.5)"><rect x="420" y="540" width="230" height="60" fill="#ffffff" stroke="#000000" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="567.5">Layer 2: MAC security,</text><text x="535" y="586.5">STP BPDU, L2 iALC</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-13"><g transform="translate(0.5,0.5)"><rect x="400" y="645" width="270" height="60" fill="#eeeeee" stroke="#36393d" pointer-events="all" style="fill: rgb(238, 238, 238); stroke: rgb(54, 57, 61);"></rect></g><g><g fill="#000000" font-family="Garamond" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="535" y="672.5">Secure access management system,</text><text x="535" y="691.5">CCTV</text></g></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-16"><g transform="translate(0.5,0.5)"><path d="M 150 0 L 145 0 Q 140 0 140 10 L 140 30 Q 140 40 135 40 L 132.5 40 Q 130 40 135 40 L 137.5 40 Q 140 40 140 50 L 140 70 Q 140 80 145 80 L 150 80" fill="none" stroke="#000000" stroke-miterlimit="10" transform="translate(140,0)scale(-1,1)translate(-140,0)rotate(180,140,40)" pointer-events="all" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></path></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-17"><g transform="translate(0.5,0.5)"><path d="M 150 100 L 145 100 Q 140 100 140 110 L 140 135 Q 140 145 135 145 L 132.5 145 Q 130 145 135 145 L 137.5 145 Q 140 145 140 155 L 140 180 Q 140 190 145 190 L 150 190" fill="none" stroke="#000000" stroke-miterlimit="10" transform="translate(140,0)scale(-1,1)translate(-140,0)rotate(180,140,145)" pointer-events="all" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></path></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-18"><g transform="translate(0.5,0.5)"><path d="M 150 210 L 145 210 Q 140 210 140 220 L 140 260 Q 140 270 135 270 L 132.5 270 Q 130 270 135 270 L 137.5 270 Q 140 270 140 280 L 140 320 Q 140 330 145 330 L 150 330" fill="none" stroke="#000000" stroke-miterlimit="10" transform="translate(140,0)scale(-1,1)translate(-140,0)rotate(180,140,270)" pointer-events="all" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"></path></g></g><g data-cell-id="Ptw68NtBQNoohyIQZFK3-19"><g tran