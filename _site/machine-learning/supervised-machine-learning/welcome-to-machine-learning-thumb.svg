<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" style="max-width:300px;height:auto;">
  <!-- Definition for repeatable pattern and pieces -->
  <defs>
    <pattern id="checkers-pattern" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#f0d9b5"/>
      <rect x="100" width="100" height="100" fill="#b58863"/>
      <rect y="100" width="100" height="100" fill="#b58863"/>
      <rect x="100" y="100" width="100" height="100" fill="#f0d9b5"/>
    </pattern>
    
    <!-- Stylized Checkers Game Pieces -->
    <g id="dark-piece">
      <circle cx="50" cy="50" r="40" fill="#2b2b2b" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#444" stroke-width="2"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#444" stroke-width="1.5"/>
    </g>
    <g id="light-piece">
      <circle cx="50" cy="50" r="40" fill="#d6332e" stroke="#8a110e" stroke-width="3"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#f0625d" stroke-width="2"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#f0625d" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- The 8x8 Board Base -->
  <rect width="800" height="800" fill="url(#checkers-pattern)" />

  <!-- === DARK SIDE (12 Pieces) === -->
  <!-- Row 1 (y=0) -->
  <use href="#dark-piece" x="100" y="0"/>
  <use href="#dark-piece" x="300" y="0"/>
  <use href="#dark-piece" x="500" y="0"/>
  <use href="#dark-piece" x="700" y="0"/>
  
  <!-- Row 2 (y=100) -->
  <use href="#dark-piece" x="0" y="100"/>
  <use href="#dark-piece" x="200" y="100"/>
  <use href="#dark-piece" x="400" y="100"/>
  <use href="#dark-piece" x="600" y="100"/>

  <!-- Row 3 (y=200) -->
  <use href="#dark-piece" x="100" y="200"/>
  <use href="#dark-piece" x="300" y="200"/>
  <use href="#dark-piece" x="500" y="200"/>
  <use href="#dark-piece" x="700" y="200"/>


  <!-- === LIGHT SIDE (12 Pieces) === -->
  <!-- Row 6 (y=500) -->
  <use href="#light-piece" x="0" y="500"/>
  <use href="#light-piece" x="200" y="500"/>
  <use href="#light-piece" x="400" y="500"/>
  <use href="#light-piece" x="600" y="500"/>

  <!-- Row 7 (y=600) -->
  <use href="#light-piece" x="100" y="600"/>
  <use href="#light-piece" x="300" y="600"/>
  <use href="#light-piece" x="500" y="600"/>
  <use href="#light-piece" x="700" y="600"/>

  <!-- Row 8 (y=700) -->
  <use href="#light-piece" x="0" y="700"/>
  <use href="#light-piece" x="200" y="700"/>
  <use href="#light-piece" x="400" y="700"/>
  <use href="#light-piece" x="600" y="700"/>
</svg>