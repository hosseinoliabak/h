project:
  type: website

website:
  title: "Hossein's Notes"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: math/index.qmd
        text: Math
      - about.qmd

format:
  html:
    #Theme options - uncomment one at a time:
    #theme: cosmo          # Current: flat, modern
    #theme: default      # Basic Bootstrap
    #theme: cerulean     # Blue accents
    #theme: flatly       # Clean, professional
    #theme: journal      # Academic, serif fonts
    #theme: lux          # Elegant, larger fonts
    #theme: pulse        # Bold, high contrast
    #theme: sandstone    # Warm, professional
    #theme: simplex      # Minimal
    #theme: yeti         # Clean, rounded
    #theme: darkly       # Dark theme
    #theme: slate        # Dark theme variant
    theme: superhero    # Dark with bright accents
    #theme: vapor        # Dark cyberpunk style
    css: styles.css
    toc: true
    code-fold: false
    code-tools: true
    # --- Grid Layout (controls page widths) ---
    # body-width: default 900px
    # sidebar-width: default 250px
    # margin-width: default 250px
    # gutter-width: default 1.5em
    grid:
      body-width: 1000px
      sidebar-width: 250px
      margin-width: 250px
      gutter-width: 1.5em



