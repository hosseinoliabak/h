filters:
  - reading-time

format:
  html:
    margin-header: _templates/margin-qr.html
    #Theme options - uncomment one at a time:
    # -- Light --
    #theme: cerulean     # Blue accents
    #theme: cosmo        # Modern, clean
    #theme: default       # Basic Bootstrap
    #theme: flatly       # Clean, professional
    #theme: journal      # Academic, serif fonts
    #theme: litera       # Clean, book-like
    #theme: lumen        # Light, subtle
    #theme: lux          # Elegant, larger fonts
    #theme: materia      # Material design
    #theme: minty        # Fresh, green accents
    #theme: morph        # Soft, modern
    #theme: pulse        # Bold, high contrast
    #theme: quartz       # Vibrant, glassy
    #theme: sandstone    # Warm, professional
    #theme: simplex      # Minimal
    theme: flatly
    #theme: spacelab     # NASA-inspired blue
    #theme: united       # Ubuntu-inspired
    #theme: yeti         # Clean, rounded
    #theme: zephyr       # Soft, modern pastel
    # -- Dark --
    #theme: cyborg       # Dark, tech style
    #theme: darkly       # Dark, easy on the eyes
    #theme: slate        # Dark, neutral
    #theme: solar        # Dark, solarized
    #theme: superhero    # Dark with bright accents
    #theme: vapor        # Dark cyberpunk style
    css: styles.css
    include-before-body:
      - text: '<script src="/theme-toggle.js"></script>'
      - text: '<script src="/resume-reading.js"></script>'
      - text: '<script src="/search-scope.js"></script>'
    toc: true
    code-fold: false
    code-tools: false
    code-copy: true
    highlight-style: github
    syntax-definitions:
      - yang.xml
    fig-format: png
    # --- Grid Layout (controls page widths) ---
    grid:
      body-width: 1800px
      sidebar-width: 400px
      margin-width: 400px
      gutter-width: 1.5em

